l_english:
  # Journals
  je_lost_duke: "Finding what is Lost"
  je_lost_duke_reason: "[ROOT.GetCountry.GetRuler.GetFullName] is rather mysterious character, not because he has secrets but because he is barely around. Such behavior is unacceptable for a ruler and thus we must encourage him to start taking care of his own country or we might end up annexed by more powerful enemies."
  je_lost_duke_king: "From Duke to a King"
  je_lost_duke_king_reason: "The Duke has stated few times in parties and interviews that he does not care about ruling because [SCOPE.sCountry('scope_SAV').GetName] has nothing to rule. One part to encourage [ROOT.GetCountry.GetRuler.GetFullName] is to give more to rule and thus force him to take care of stately affairs."
  je_lost_duke_reforms: "Following Vittorio Amedeo I"
  je_lost_duke_reforms_reason: "Vittorio Amedeo I transformed the Savoiard economy to more modern standard, however his death stopped these. To encourage the Duke to take care of this nation we must continue this modernisation so [ROOT.GetCountry.GetRuler.GetFullName] is compelled to take credit for these reforms."
  je_lost_duke_dictator: "Autocratic State"
  je_lost_duke_dictator_reason: "[ROOT.GetCountry.GetRuler.GetFullName] has previously stated that he barely has any real power because of the Clergy and Nobles making most of the decisions and Vetoing the rest. One way to encourage our Duke to take lead is to reform the laws to more autocratic."
  
  je_radical_duke: "Achieving our Birthright"
  je_radical_duke_reason: "[ROOT.GetCountry.GetHeir.GetFullName] is a eccentric figure due to his "studies" abroad. He also views himself as the rightful ruler due to [ROOT.GetCountry.GetRuler.GetFullName] failing to rule this nation. We must help him gain his throne or this nation will surely wither."
  je_radical_duke_reforms: "Liberal Reforms"
  je_radical_duke_reforms_reason: "One part of deposing [ROOT.GetCountry.GetRuler.GetFirstName] is to show the incompetency of his rule. The path to this is to liberalize the state and give more rights and oppurtunities to our people."
  je_radical_duke_champ: "Count of the People"
  je_radical_duke_champ_reason: "One part of deposing [ROOT.GetCountry.GetRuler.GetFirstName] is to gather popular support for [ROOT.GetCountry.GetHeir.GetFirstName]. The path to this is to lead armies and aid the less fortunate."
  

  #Decisions

  #Events
  dvg_savoy.1.t: "The Duchy of [SCOPE.sCountry('scope_SAV').GetName]"
  dvg_savoy.1.d: "Not much has happended in [SCOPE.sCountry('scope_SAV').GetName] from the days of Umberto Biancamano di Savoia"
  dvg_savoy.1.f: "From the days of the first Count Umberto di Savoia our nation has not seen much improvement in it's status. Our country became a duchy and gained some territories during the Middle Ages but those days are long gone.\n The loss of county of Geneva to the King of Burgundy was a great shame to our nation but after that our nation has remained still. \n Nowdays our nation is heavily influenced by the Anglois throne and most geopolitical affairs are heavily regulated by our neighbour. Also Italian nationalism after [concept_dvg_german_revolution] has risen a new oppurtunity to finally break our national stalemate. If we can harness this nationalism we may break free and move towards Italy or even succumb to more hostile forces abroad.  "
  dvg_savoy.1.a: "We have to see what future holds for us"
  
  dvg_savoy.2.t: "The late Duke Vittorio Amedeo I and his sons"
  dvg_savoy.2.d: "Only 2 years ago our beloved Duke Vittorio Amedeo I died and his eldest twin son [ROOT.GetCountry.GetRuler.GetFullName] inherited the throne"
  dvg_savoy.2.f: "The late Duke was one of the most beloved in our nation and brought many reforms to our economy and army. Most famously he started industrialisation of our nation and greatly changed the economical landscape of our core counties of Savoia and Torino. \n Even in his personal affairs he was lucky. His marriage to Duchess Maria Ludovika von Habsburg was happy as the Duke fell in love wit her years before their marriage. Unfortunately the Duchess passed away at the young age of 31 during childbirth devastating the Duke. \n Luckily he had two sons naming them after himself and his wife.\n As the dukes boys grew up it became clear they both wanted the throne and neither were good options for it. The eldest has barely tried to be a duke even after his fathers death and would much rather spend time hunting, riding and relaxing. This has earned him the nickname of the "Lost Duke" due to never being around. \n 3 minutes younger son Count of Aosta [ROOT.GetCountry.GetHeir.GetFullName] is not that much better, sure he is more interested in Royal Affairs but views them from complitely opposite end. He also has quite eccentric personality and for that reason he was sent to "study" in Austria. There he gained some radical ideas from famous activist like Corleone and Gariboldi and now seeks to reform [SCOPE.sCountry('scope_SAV').GetName] into a radical monarchy. Our only choice is to decide whose claim we support. "
  dvg_savoy.2.a: "This "Lost Duke" must be reformed"
  dvg_savoy.2.b: "Only way to the future is with "3-minute-Count"."
  
  dvg_savoy.21.t: "[ROOT.GetCountry.GetRuler.GetFullName] and his absence"
  dvg_savoy.21.d: "The one who is Lost must be found"
  dvg_savoy.21.f: "For years [ROOT.GetCountry.GetRuler.GetFullName] has failed to rule this nation as he is supposed to. He would rather spend his days hunting, racing and relaxing in Paris. This is simply unacceptable behaviour for a Duke and we must begin a process to reform him into a proper leader. \n The path to reform is hard and there are 4 options for this: Autocratic laws reforms, education in state management, modernising our economy even further, crowning the Duke a King after successful diplomacy or conquest."
  dvg_savoy.21.a: "Reform begins..."
  
  dvg_savoy.210.t: "The Duke has his final exam"
  dvg_savoy.210.d: "Year of schooling has come to an end"
  dvg_savoy.210.f: "Over the the last year The Duke has spent his days studying in the best university in Angleterre, Université d'Oxford. This morning he took to the exam hall to show what he has learned. Hopefully he learned even something so he might take interest in state management. There exists a chance that he did not actually learn anything and just socialized for a whole year."
  dvg_savoy.210.a: "The Exam results are as follows..."
  
  dvg_savoy.22.t: "[ROOT.GetCountry.GetHeir.GetFullName] and his ambition"
  dvg_savoy.22.d: "The 3-minute-Count has his ambitions set higher than most in his place it is time to achieve them"
  dvg_savoy.22.f: "Ever after being born three minutes later than his brother [ROOT.GetCountry.GetHeir.GetFirstName] has grown hungry for power. His brothers incompetency has certainly not helped and now even the people are starting to support [ROOT.GetCountry.GetHeir.GetFirstName]s cause. \n In Wien he gained radical views about ruling a nation and now his political views are next to Giuseppe Corleones Social Fascism. [ROOT.GetCountry.GetHeir.GetFirstName] sees that the only way [SCOPE.sCountry('scope_SAV').GetName] can be his is with the people. \n That is way the path to his rule needs 4 things: popular support for his throne, [ROOT.GetCountry.GetRuler.GetFirstName] needs to be either permanently disgraced or killed, the country need serious reforms into liberalisation and modernisation."
  dvg_savoy.22.a: "Rightful ruler for [SCOPE.sCountry('scope_SAV').GetName] is soon here"
  
  dvg_savoy.220.t: "[ROOT.GetCountry.GetHeir.GetFullName] decides on plans for assasination"
  dvg_savoy.220.d: "Choices are assasination or funded protests"
  dvg_savoy.220.f: "While immoral and unacceptable [ROOT.GetCountry.GetHeir.GetFirstName] has decided to scheme against his brother to get rid of him. \n One part of getting rid of [ROOT.GetCountry.GetRuler.GetFullName] is to simply kill him. This is risky with low chance of success and there is a chance the plot gets discovered and [ROOT.GetCountry.GetHeir.GetFirstNameName] gets excecuted for it. And even if the plot succeeds the country will be in disarray until [ROOT.GetCountry.GetHeir.GetFirstNameName] can legitimise his rule. \n The other option is simply to fund protets against him in hopes of permanently shaming him. This option has better chanches and lower risk but still permanent disgrace is not the easiest. The decision is yours...."
  dvg_savoy.220.a: "Only way forward is to kill him"
  dvg_savoy.220.b: "Perhaps a public protest near his Hunting Lodge should do the trick"
  
  dvg_savoy.221.t: "[ROOT.GetCountry.GetHeir.GetFirstName] decides how to aid his fellow countrymen"
  dvg_savoy.221.d: "Why should the people starve when the court has never seen hunger?"
  dvg_savoy.221.f: "A moral choice to gain popular support is to simply help the less fortunate. Afterall not everyone gets paid a Royal Tax and gets sent to Europe for studies complitely on taxpayers expense. It is time [SCOPE.sCharacter('scope_amedeo').GetFirstName] starts giving this money back to the people."
  dvg_savoy.221.a: "Time to volunteer in hospitals, soup kitchens and donate to charities"
  
  
  #MISC.
  #Icons
  lost_duke: "The Lost Duke"
  lost_duke_desc: "This person is known as the "Lost Duke" due to having little to no interest in ruling a nation"
  lost_duke_reform: "The Found Duke"
  lost_duke_reform_desc: "The Lost Duke is no more and this person is now "Found Duke""
  radical_duke: "The 3-minute-Count"
  radical_duke_desc: "This person is known as the "3-minute-Count" due being born 3 minutes later than his brother"
  radical_duke_reform: "Birtright gained"
  radical_duke_reform_desc: "3-minute-Count is no more and this person has now achieved his birthright"
  
  button_lost_duke_school: "Send the Duke to a State University"
  button_lost_duke_school_desc: "We can "voluntarily" send the Duke to a state university to study state management. Unfortunately the Duke is hesitant and might not even learn anything over the year period. Fortunately his absense doesn't actually affect our state since he barely does any ruling."
  button_radical_duke_kills: "Attempt to remove [ROOT.GetCountry.GetRuler.GetFirstName]"
  button_radical_duke_kills_desc: "We can attempt to remove [ROOT.GetCountry.GetRuler.GetFirstName] from his power through less than moral means. Alternatively we can support protests against him to lower his popular support."
  button_radical_duke_aids: "Increase 3-minute-Counts support"
  button_radical_duke_aids_desc: "The 3-minute-Count can increase his popular support by giving up his Royal Tax for the poor, however the effect of this varies."
  
  je_lost_duke_goal: "To reform the Duke 3 of the following must be done: \n- The Duke has gained a formal education and became politically invested \n- The Duke has been crowned a King one way or another \n- The Duke has continued his fathers path in industrialisation and modernisation of the economy. \n- The State has become Royal Autocratic dictatorship"
  je_radical_duke_goal: "To gain control 3 of following must be done: \n- Vittorio Luigi must be dead \n- Liberal reforms have swept the country \n- Amedeo has become the champion of the people \n- Vittorio Luigi has been disgraced"
  
  #Notifications
  duke_school_success: "The Duke has gained newfound interest in State Management and has taken a position on his ruling style. Reform continues..."
  duke_school_fail: "The Duke failed his exams and the professor could not even tell if the Duke knew what exam this was."
  amedeo_champ_almost: "[SCOPE.sCharacter('scope_amedeo').GetFullName] aided his fellow countrymen and gained some positive support"
  amedeo_champ: "[SCOPE.sCharacter('scope_amedeo').GetFullName] aided his fellow countrymen and achieved overwhelming popular support"
  amedeo_fails: "[SCOPE.sCharacter('scope_amedeo').GetFullName] has failed to achieve anything in his mischievous plans"
  luigi_disgraced: "[ROOT.GetCountry.GetRuler.GetFullName] has failed to adress our paid protests and has instead disgraced himself in front of the whole nation"
  luigi_shamed: "[ROOT.GetCountry.GetRuler.GetFullName] has adressed our paid protestors and calmed down the situation, but not without showing his incompetency"
  amedeo_kys: "[SCOPE.sCharacter('scope_amedeo').GetFullName] the worst has happened and the scheme was discovered and traced back to [SCOPE.sCharacter('scope_amedeo').GetFirstName]. Before arrest [SCOPE.sCharacter('scope_amedeo').GetFullName] decided to take his own life instead of facing disgrace and excecution"
  amedeo_kill: "The plan has been successful and [SCOPE.sCharacter('scope_luigi').GetFullName] lies dead after a staged assasination"
  
