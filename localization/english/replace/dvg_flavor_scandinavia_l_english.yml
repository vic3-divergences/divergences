 ###EVENTS###

 #Primer
 dvg_scandinavia.1.t: "The Kingdom of [ROOT.GetCountry.GetName]"
 dvg_scandinavia.1.d: "The United Kingdom of Scandinavia and Scotland, heir to the Kalmar Union, extends from Scotland to Novgorod, from the Arctic Circle to northern Germany."
 dvg_scandinavia.1.f: "Following the conclusion of the [concept_dvg_german_revolution], [ROOT.GetCountry.GetName], although making great territorial gains, finds itself in a delicate position. Unrest and separatist nationalism are on the rise from the Highlands of Scotland to the marshes of Finland, fueled by economic decline since the 18th century. King [ROOT.GetCountry.GetRuler.GetFullName] the III, who ascended the throne after the end of the [concept_dvg_german_revolution], has called the Scandinavian Parliament into session for the first time in years after the absolutist policies of his father. Yet his methods remain authoritarian, [concept_dvg_fish]. A great storm is brewing in Scandinavia, and whether the United Kingdom will manage to weather it remains to be seen"
 dvg_scandinavia.1.a: "Til Skandinaven!"
 
 ##Highland Clearances###
 #Gaels plea
 dvg_scandinavia.101.t: "The Gael's Plea"
 dvg_scandinavia.101.d: "Despite their warring nature, the [concept_dod_sca_gaels] have come forth with a united petition, seeking several legal protections."
 dvg_scandinavia.101.f: "Their petition asks for legal protection over their language, permission to teach their language in schools, along with recognition of Gaels as a separate group from Scots.\n\nThe petition caused a stir in the elite circles of Scotland however, with many [concept_dod_sca_lairds] decrying it as a selfish attempt to revert progress, others suggesting that the Gaels only seek to elevate themselves above the rest of the population! Several elite schools have also voiced their opposition, 'How will we teach when we must speak two languages? Must we repeat all lessons all for a few? Perhaps we ought to not allow Gaels to enroll!', amongst a few other smaller urban institutions based in the highlands.\n\nNow the decision is up to us, shall we accept their petition, or favour the Lairds?"
 dvg_scandinavia.101.a: "Favour the Lairds, we must uphold progress"
 dvg_scandinavia.101.b: "Favour the Gaels, let it be known that we are a benevolent country"
 dvg_scandinavia.102.t: "The Scottish New Towns Act"
 dvg_scandinavia.102.d: "The Scottish Riksdag is currently debating the New Towns Act, an act that will assist in the development of 'Lairdbys' - 'Lord Towns' - across the highlands."
 dvg_scandinavia.102.f: "'Lairdbys' are towns constructed under the orders of the [concept_dod_sca_lairds], with several notable towns having grown to house thousands of people. However the practice has been kept largely private, hence privately funded! And, somewhat unregulated...\n\nThe Lairds argue that government funding would allow the clearances to progress at a faster rate, encourage industrial development, and facilitate the migration of others from the Mainland of Scandinavia to move over to these new towns. All they require is a little bit of funding to make it happen!\n\nConversely, the Act has several opponents, arguing that the bill is a waste of money and will only continue to impoverish the peasants and empower the Lairds, who will hold greater control over them. Many Lairds of course have decreed this as a slanderous and anti-progressive view!\n\nWhat shall the be fate of the New Towns Act?"
 dvg_scandinavia.102.a: "The Act passes"
 dvg_scandinavia.102.b: "The Act fails"
 dvg_scandinavia.103.t: "The Scottish-Mainland Settlement Act"
 dvg_scandinavia.103.d: "With the increasing population of Scandinavians in Scotland, a new Act has been floated in the Riksdag, allowing official Scandinavian settlement in Scotland."
 dvg_scandinavia.103.f: "Historically, Scandinavians were barred from settling in Scotland, with complex legal processes in place to keep the Scandinavian population in Scotland low. Despite this, many have still managed to move over, generally with direct permission from the Lairds to move onto their lands. However now with a large amount of Scandinavians residing in Scotland, it has become clear to the Riksday that something must be done, lest we face an internal migration crisis!\n\nOpponents to the Act highlight the already overpopulated regions of Scotland, noting that despite efforts taken, many cities are overflowing! Other, more radical groups, posture that this is an effort to erode Scottish identity and weaken the Kingdom of Scotland internally!\n\nProponents of the new Act note that this will facilitate the expansion of the booming industries of Scotland, predicting further growth in manufactoring and mining industries. Some also note that further Scandinavian influence on Scotland will help them more fiercely defend against any attacks, yet whether this is true or not, we cannot say.\n\nWhat shall be the fate of the act?"
 dvg_scandinavia.103.a: "The Act passes"
 dvg_scandinavia.103.b: "The Act fails"
 
 ###JOURNAL ENTRIES###
 je_sca_chaos_under_four_crowns: "Chaos Under Four Crowns"
 je_sca_chaos_under_four_crowns_reason: "Scandinavia is a nation of many people, whilst Scandinavians and [concept_dod_sca_cufc_scots] make up the majority of the population, vast tracts of our empire do not see themselves as Scandinavian!\n\nThe [concept_dod_sca_cufc_finns] in the east are the most unruly, with the [concept_dod_sca_cufc_karelians] even further East, still loyal to the crown. The [concept_dod_sca_cufc_germans] sit complacent to our south, under the watchful eye of our military garrison in the region. Finally the backwater Baltic region populated by the [concept_dod_sca_cufc_balts], a sluggish region relegated as a buffer to protect our Baltic Lake!\n\n #red #bold Without our careful management, we could see our empire torn apart from within!"
 je_sca_cufc_finland: "Finnish Tensions"
 je_sca_cufc_finland_reason: "The Finns have long protected their unique language and heritage, despite being under the Scandinavian nation for centuries, they have been the most unruly. Whilst there has been some success in assimilating them - with some significant cities speaking Scandinavian, and the [concept_dod_sca_finland_landreform] entrentching landowners under the Crown of Sweden as the main landholders of Finland - for the most part, the Finns remain opposed to Scandinavia and largely unintegrated."
 je_sca_cufc_baltic: "Baltic Tensions"
 je_sca_cufc_baltic_reason: "The Balts - Estonians and Latvians - are a comparatively minor part of our nation, being a smaller, generally more rural population at the strategic edge of our nation. Thier position provides us a buffer against the anarchy that is Russia and the slow Polish state, as well as ensuring our position as Hegemon of the Baltic Sea. Though the region is a backwater, with an unclear governing system devised from Livonian, German, Baltic and Scandinavian traditions, it is in dire need of reform."
 je_sca_cufc_germany: "German Tensions"
 je_sca_cufc_germany_reason: "The Germans are the most recent addition to our Empire, however have quickly been integrated, their industrious ethic and Protestant traditions seen as valuable and akin to Scandinavian culture. However it is unlikely that they will remain complacent for long, Germany is a tumultous place and any significant German state would likely see our possessions are a German homeland. Additionally, the German population is the one of the largest minorities in Scandinavia, any uprising would be devastating for us!"
 je_sca_kings_watch: "Anger of the Crown"
 je_sca_kings_watch_reason: "The monarchy and nobility have kept a close eye on the parliaments following the 1820 reforms, whilst they hold less power over the country, they still remain strong. Whilst we may want what's best for our people, the nobility are our people too, the most powerful of our people... \n\n#bold #red We must tread carefully! Pushing the nobility and monarchy too much may see a return to pre-1820 rule!"
 je_sca_cufc_karelia: "The Karelian March"
 je_sca_cufc_karelia_reason: "The Karelians have a more priveleged position within Scandinavia, those in the region of Karelia live under the [concept_dvg_sca_karelian_march], enjoying a degree of autonomy in return for their service in the Scandinavian army. Whilst the arrangement has been comfortable for both the Scandinavian government and Karelian leadership in the March, there's no guarantee that they will sit idly by as other groups within our nation begin to stir..."
 je_sca_highland_clearings: "Hieland Clearances"
 je_sca_highland_clearings_reason: "The Hieland Clearances have been ongoing since the mid 1700s, with new advances in agricultural technologies, many Scottish [concept_dod_sca_lairds] see it fit to centralise their land. Moving away from rin-rig systems and centralising populations into "Lairdbys" - 'Lord Towns' - from smaller villages. This has lead to a reduction in crop production as feilds are replaced with pastures for grazing.\n\n The Hieland Clearances have been met with resistance from many inhabitants of the Hielands, in particular, the [concept_dod_sca_gaels] have seen a gradual erasure of their language and lifestyle as Lairds increasingly encroach on their traditional agricultural lifestyle."

