 amendment_karelian_march: "The Karelian March"
 amendment_karelian_march_desc: "The Karelian March is a March that was established in 1677 as a buffer against the Republic of Novgorod and Russia as a whole. The March is subject to the Arch-King - rather than the Swedish or Norwegian crowns - and gives a significant degreee of autonomy to the native Karelian population, respecting their customs and language. The Karelians are recognised as some of the best trained soldiers within Scandinavia and have a militarised culture due to years under the march."
