l_english:
 je_prussian_independence: "Prussian Independence"
 je_prussian_independence_reason: "To gain independence we must liberate all of Prussia from the Commonwealth by sword or diplomacy" 
 je_prussia_east: "To unite Balters"
 je_prussia_east_reason: "Balters like the name suggests are spread among the Baltic coasts. Our future are with our own and we shall unite Balters und Prussian rule"
 je_prussia_west: "Our German Roots"
 je_prussia_west_reason: "Our ancestors were crusaders from Germany. Centuries of separation has not made us forget that. It is time to march west and join our german kin"
 je_prussian_poles: "Poles of Prussia"
 je_prussian_poles_reason: "For centuries Polish citizens in [SCOPE.sCountry('scope_PRU').GetName] have enjoyed a special but unofficial status in our realm. If we are to gain independence we must either make them officially equal citizens or complitely shatter this special status. #blue Gameplay tip: If you wish to become peacefully independent you need to complete this Journal Entry first.#!"
 
 buy_indepence: "Buy Independence from the Commonwealth"
 buy_indepence_desc: "If we can amass sufficient wealth and maintain strong relations with P
 oland, we may be able to purchase our independence peacefully."
 scandi_backing: "Secure Scandinavian Support"
 scandi_backing_desc: "If diplomacy fails, we may turn to force. By offering incentives, we could persuade the Scandinavian crown to support our struggle for independence."
 bohemian_backing: "Secure Bohemian Support"
 bohemian_backing_desc: "Should peaceful means prove insufficient, we may enlist Bohemia's aid. With the right incentives, they could be convinced to join our cause."
 prussian_nationalism: "Agitate prussian people"
 prussian_nationalism_desc: ""
 prussian_loyalty: "Calm down prussian nationalism"
 prussian_loyalty_desc: ""
 courland_unity: "Unification treaty with Courland"
 courland_unity_desc: "Our relations with the other Balter peoples have improved greatly. A formal proposal of union with Courland may now be within reach."

 dvg_prussia.1.t: "Duchy of [SCOPE.sCountry('scope_PRU').GetName]"
 dvg_prussia.1.d: "Ducal lands of [SCOPE.sCountry('scope_PRU').GetName] have been a part of Polish-Lithuanian Commonwealth for over 300 years having seen barely any improvement over the years"
 dvg_prussia.1.f: "Since the days of the Protestant Reformation, [SCOPE.sCountry('scope_PRU').GetName] has stood as a vassal beneath the Polish-Lithuanian Commonwealth. While other German lands have flourished and modernized, our duchy has languished in neglect. Yet now, under the rule of [ROOT.GetCountry.GetRuler.GetFullName], a new vision begins to take shape, one of reform, strength, and perhaps even independence. The path ahead is uncertain, but destiny rarely favors the passive."
 dvg_prussia.1.a: "[SCOPE.sCountry('scope_PRU').GetName] must not remain in the shadows"

 dvg_prussia.2.t: "Prussian Destiny"
 dvg_prussia.2.d: "Having gained it's independence, [SCOPE.sCountry('scope_PRU').GetName] faces an important decision about our future."
 dvg_prussia.2.f: "Miracle has happened and our 300 years of oppression has come to an end. [ROOT.GetCountry.GetRuler.GetFirstName] has achieved what no previous Prussian Duke could, independence. Our future is just beginning and the next step is figuring out if we want to return to our Hohenzollern and Saxon roots in Germany. Other more sensible solution is to stay right here where we have always been and pursue unity and happiness for the Balter people. Is our destiny to the West or to the East?"
 dvg_prussia.2.a: "Our Destiny remains in the East"
 dvg_prussia.2.b: "Our Destiny is to the West"
 
 dvg_prussia.3.t: "Capital renovations"
 dvg_prussia.3.d: "The time has come to shape the heart of our nation for a new era"
 dvg_prussia.3.f: "As [SCOPE.sCountry('scope_PRU').GetName] rises from obscurity, the question of our capital becomes ever more pressing. Königsberg, though rich in history, no longer reflects the ambitions of a modern state. Some argue for its renewal, transforming it into a beacon of progress on the Baltic. Others look westward, toward Berlin, a humble settlement with the potential to grow alongside our German aspirations. And to the east lies Riga, a thriving Baltic city that could anchor our influence among the Balter peoples. The choice we make will define not only our administration, but our very identity"
 dvg_prussia.3.a: "Renovate Königsberg"
 dvg_prussia.3.b: "Village of Berlin as our German capital"
 dvg_prussia.3.c: "Riga as the Eastern capital"
 
 dvg_prussia.4.t: "Curious offer from Prussia"
 dvg_prussia.4.d: "Prussia is offering us some monetary compensation for their independence"
 dvg_prussia.4.f: "A sealed letter has arrived bearing the seal of Prussia. They propose we help them gain independence and in return we recieve hefty monetary gains and some guarantees. [ROOT.GetCountry.GetRuler.GetFullName] pondered long and then stated to our foreign minister..."
 dvg_prussia.4.a: ""Vi elsker krig!""
 dvg_prussia.4.b: ""What even is Prussia ?""
 dvg_prussia.7.a: ""Für deutsche Volk!""
 dvg_prussia.7.b: ""Prussia is not even German"" 
 
 dvg_prussia.5.t: "Response from our benefactor"
 dvg_prussia.5.d: ""
 dvg_prussia.5.f: "Early this morning we recieved a sealed letter from our secret benefactor. Our Foreign Minister had only a quick qlance of the letter and could already guess their response which said "Unfortunately we have decided not proceed with your application...""
 dvg_prussia.5.a: "Verdammte Scandinavier!"
 dvg_prussia.8.a: "Verdammte Böhmen!"
 
 dvg_prussia.6.f: "Early this morning we recieved a sealed letter from our secret benefactor. Our Foreign Minister had only a quick qlance of the letter and could already guess their response which said "We have decided to move forward with your application...""
 dvg_prussia.6.a: "Zum Krieg!"
 
 dvg_prussia.10.t: "Curious offer from Prussia"
 dvg_prussia.10.d: "Prussia is offering us unification"
 dvg_prussia.10.f: "A sealed letter has arrived bearing the seal of Prussia. They propose we unite with them due to being allies and kin. [ROOT.GetCountry.GetRuler.GetFullName] pondered long and then stated to our foreign minister..."
 dvg_prussia.10.a: ""Unification it is then""
 dvg_prussia.10.b: ""We are not even close with Prussia""
 
 dvg_prussia.11.t: "Response from Courland"
 dvg_prussia.11.d: ""
 dvg_prussia.11.f: "Early this morning we recieved a sealed letter from our kin. Our Foreign Minister had only a quick qlance of the letter and could already guess their response which said "Unfortunately we have decided not proceed with your application...""
 dvg_prussia.11.a: "Bruderkrieg is coming"
 
 dvg_prussia.12.t: "Response from Courland"
 dvg_prussia.12.d: ""
 dvg_prussia.12.f: "Early this morning we recieved a sealed letter from our kin. Our Foreign Minister had only a quick qlance of the letter and could already guess their response which said "We have decided to move forward with your application..."
 dvg_prussia.12.a: "One step closer to united Baltics"
 
 dvg_prussia.13.t: "Baltic Alliance?"
 dvg_prussia.13.d: ""
 dvg_prussia.13.f: "Our Baltic neighbour is in distress and in need of allies. Perhaps we could offer to help them in exchange of some territories. Scandinavia will not give these land easily so heavy concessions are needed for any kind of meaningful deal. We have two options: Offer the control of some of our foreign matters to Scandinavia and economic concenssions in exchange of Terra Mariana (Estonia and Latvia) or we could offer to buy Scandinavian Baltic coast for heavy economic and militaristic concessions. In both cases we gain much and lose much."
 dvg_prussia.13.a: "Offer for Terra Mariana"
 dvg_prussia.13.b: "Offer for German Baltic coast"
 
 dvg_prussia.14.t: "Treaty offer from Prussia"
 dvg_prussia.14.d: ""
 dvg_prussia.14.f: "Our Baltic neighbour to the south has approached us with an interest offer. They offer to buy our Balter land of Estonia and Latvia offering control of their foreign matters in exchange. Some other terms they offer are militaristic access and market control over their lands. Our answer to Prussia shall be..."
 dvg_prussia.14.a: "If they want it they can have it"
 dvg_prussia.14.b: "We have other ambitions for Prussia"
 
 dvg_prussia.15.t: "Treaty offer from Prussia"
 dvg_prussia.15.d: ""
 dvg_prussia.15.f: "Our Baltic neighbour to the south has approached us with an interest offer. They offer to buy our German Baltic coast offering heavy economic concessions and eternal gratitude in exchange. Some other terms they offer are militaristic access and market control over their lands. Our answer to Prussia shall be..."
 dvg_prussia.15.a: "Let Prussians die for Germany for once."
 dvg_prussia.15.b: "Our German lands are too much for little Prussia"
 
 dvg_drang_nach_osten: "Drang nach Osten"
 dvg_drang_nach_westen: "Drang nach Westen"
 
 dvg_new_capital: "Renovate Königsberg"
 dvg_new_capital_desc: "Königsberg is quite outdated compared to our European counterparts. Renovations are in order to bring the city in to the Elisabethian era. This process is not cheap so we could also build a new capital closer to our kin"
 
 dvg_scandi_prussia: "Baltic Alliance proposal"
 dvg_scandi_prussia_desc: "Our most powerful neighbor on the Baltic Sea is Scandinavia. Perphaps there could be a way to a sway our mighty neighbor to our help."
 
 treaty_name_scando_prussia: "Baltic Alliance"
 
 poles_happy_tt: "Warsaw is Impressed"
 poles_need_love_tt: "Polish are accepted in our realm"
 
 amendment_polish_autonomy: "Unofficial Polish Autonomy"