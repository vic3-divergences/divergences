l_english:

 #Journal Entry
 je_vryland_nation: "The Freedom and Foreignty"
 je_vryland_nation_reason: "As calls around the world have developed to assert a proper nation-state, the people of Vryland find themselves no stranger to them. However - the fact remains of the Bastaards being an elite minority among a population that still views them as foreign. If the Bastaards were to ever be a proper African polity - it might make sense to adjust how it manages its borders and citizens despite being founded as a place to practice free enterprise."
 #Events

 #Vryland primer
 dvg_vryland.1.t: "Land of the Free"
 dvg_vryland.1.d: "In the power vacuum of the Burgundian-Geuzen Wars, a new republic was established to the north of the Cape, to protect Black enterprise."
 dvg_vryland.1.f: "What was once a trickle of escaped slaves and discriminated Bastaards, soon became a flood of refugees finding a safe haven in sparsely populated land. Although the wars have been put on hold for now, our state is now bordered by slavers and colonisers. Surely, as the "civilized" Africans, it is our duty to save our bretheren from this oppression and show them the ways of free enterprise."
 dvg_vryland.1.a: "Our freedom may not come without blood."
 dvg_vryland.1.b: "Our freedom may not come without knowledge."


 #opstalia wants trans oranje
 dvg_vryland.2.t: "Opstalia demands Trans-Oranje"
 dvg_vryland.2.d: "Over the past few years, settlers from  [SCOPE.sCountry('scope_OPS').GetName] have been establishing communities in the Trans Oranje region of our country. Now, due to this demographic shift, Opstalia believes they have a rightful claim over it."
 dvg_vryland.2.f: "Giving up this land without a fight would greatly undermine the reason we even established an independent nation in the first place. However,  [SCOPE.sCountry('scope_OPS').GetName] is likely better armed than us given their experience with conflict."
 dvg_vryland.2.a: "Reject their demand"
 dvg_vryland.2.b: "Surrender control"

 #leeuwin wants trans oranje
 dvg_vryland.3.t: "Leeuwin demands Trans-Oranje"
 dvg_vryland.3.d: "Over the past few years, settlers from Leeuwin have been establishing communities in the Trans Oranje region of our country. Now, due to this demographic shift,  [SCOPE.sCountry('scope_LEW').GetName] believes they have a rightful claim over it."
 dvg_vryland.3.f: "Giving up this land without a fight would greatly undermine the reason we even established an independent nation in the first place. However, Leeuwin is likely better armed than us given their experience with conflict."
 dvg_vryland.3.a: "Reject their demand"
 dvg_vryland.3.b: "Surrender control"

 #Vryland and borders
 dvg_vryland.4.t: "Sovereignty Question"
 dvg_vryland.4.d: "Ever since it was founded, [ROOT.GetCountry.GetName] has been intended to be a country founded for the protection of Black enterprise against the encroachment of White greed. However, with the rise of nationalism, the limits to the freedom of this enterprise has been questioned."
 dvg_vryland.4.f: "For much of the indigenous Africans, the concept of closed borders is relatively foreign. To enact border controls would be to impose on their way of life. However, the lack of border controls "
 dvg_vryland.4.a: "It's time we be stricter on who we let in."
 dvg_vryland.4.b: "Freedom of enterprise includes freedom of movement."

 dvg_vryland.4.t: "Geuzen Settler Encroachment"
 dvg_vryland.4.d: "Due to the lack policies regarding border controls, Geuzen settlers have entered our terrtiory and are taking up - giving competition to our Black population."
 dvg_vryland.4.f: " 'They just started coming in en masse when they heard there was nothing to stop them. Already, they're intimidating the local populace with their European-imported weapons!' "
 dvg_vryland.4.a: "Start shooting to show them who's in charge."
 dvg_vryland.4.b: "We can't risk giving our enemies a casus belli."

 dvg_vryland.5.t: "Geuzen Settlers Attacked"
 dvg_vryland.5.d: "A bunch of entrepeneurial settlers from our country have entered the so called 'Vryland' territory but have been attacked by their government.."
 dvg_vryland.5.f: " 'We were just mining for gold and trying to make a living - and then seemingly out of the blue the Vryland soldiders started firing at us!' "
 dvg_vryland.5.a: "If it's a fight they want it's a fight they'll get."
 dvg_vryland.5.b: "We can't risk escalating this conflict."

 dvg_vryland.6.t: "Khoisan Resistance"
 dvg_vryland.6.d: "Ever since Vryland has decided to enact border controls, the Khoisan pastorialists have shown resistance - openly ignoring warnings and property rights, sometimes even fighting back when our guards confront them.."
 dvg_vryland.6.f: " For as long as the Khoisan could remember, the concept of borders and private property was foreign to them. They have been roaming the land for centuries, and they don't see why they should stop now. However, if we let them get away with this, it would be a sign of weakness that our enemies could exploit."
 dvg_vryland.6.a: "Maybe we put the Khoisan in their place."
 dvg_vryland.6.b: "We can't risk giving our enemies a casus belli."

 dvg_vryland.7.t: "Resource Theft"
 dvg_vryland.7.d: "Thanks to the existence of border controls, many people have been turned away from our country - providing a safe haven for the Bastaards. However, there's an alleged case of [ROOT.GetCountry.GetName] nationals raiding Tswana villages and fleeing back to [ROOT.GetCountry.GetName] side of the border. Tswana authorities demand extradition."
 dvg_vryland.7.f: " The Tswana law enforcement has tried chasing the Bastaard raiders back to our side of the border, but our border guards turned back the Tswana citing ill intent, and the fact that the alleged criminals are their family members. With the hard border preventing any proper investigation, the conflict has devolved into a battle of words with accusations. As the case becomes more widespread, many of our citizens are suggesting that allowing the Tswana to investiage and extradite would undermine our own sovereignty."
 dvg_vryland.7.a: "Extrade the alleged raiders. We need to show we are respectable neighbors."
 dvg_vryland.7.b: "We shall protect our own citizens wherever they go or whatever they do."

 dvg_vryland.8.t: "Tswana Counterattack"
 dvg_vryland.8.d: "Having had enough of the our alleged harboring of criminals, the Tsawana have ignored our border guards and have directly begun kidnapping the alleged raiders from earlier. The Armed Forces have seen this as a blatant declaration of war."
 dvg_vryland.8.f: " 'They're not even stopping with their alleged raiders. They're now also kidnapping their friends and family for supposedly aiding them in the first place, and taking what they can as part of reparations.' - a [ROOT.GetCountry.GetName] citizen was quoted as saying. As expected, the Tswana authorities deny this assertion."
 dvg_vryland.8.a: "The time has come to cement Bastaard jurisdiction here."
 dvg_vryland.8.b: "This land has always been and always will be Tswana."


#Decisions

dvg_vryland_coast: "Annex the Namibians"
dvg_vryland_coast_desc: "For far too long, Vryland has been a landlocked country with no coast. With our colonial efforts better enabled, we should take it before anybody else does."