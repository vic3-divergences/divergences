l_english:
  #Journal Entries
  
  je_guinea_imperialism: "Dominion over the Delta"
  je_guinea_imperialism_reason: "As a bastion of civilization, it is up to us to spread our control over the greater Niger Delta area, unchallenged even by the treacherous Afro Frankish."

  je_ashanti: "Cornered Kotoko"
  je_ashanti_reason: "Ever since the eviction of the Ashanti from its position in the Gold Coast, new Afro-Frankish overlords have been putting in the effort to impose their own culture and politics onto the indigenous population. As the national fervor of the Akan rises, perhaps it is time for the Ashanti to reassert their sovereignty and make sure the Ashanti nation is the recognized, legitimate entity."

  je_emancipe: "The Coast of Freedmen"
  je_emancipe_reason: "Our country has been founded as an anti slavery movement aimed to abolish slavery in West Africa."
 
  je_an_baptiste_champlain: "The Modern Moses"
  je_an_baptiste_champlain_reason: "From its inception as a slave revolt to its current state as a recognized country, the Cote des Affranchais has been shaped by the vision and leadership of the beloved [ROOT.GetCountry.GetRuler.GetFullName]. However, the future-minded in our country worry that the country has become too reliant on his leadership and that his eventual death will lead to instability."

  je_akan_nationalism: "Returning the Colonization"
  je_akan_nationalism_reason: "Despite the help in the revolt, the Afro-Frankish are still seen as a foreign imposition upon the indigenous Akan population as land has been seized from former Ashanti territory. Under proper governance, perhaps a reconciliation can be reached or else the Akan might revolt."

  je_songhai_gao: "The Songhai Chorus"
  je_songhai_gao_reason: "As it stands, the Songhai Empire has fractured into too many different nations vying for their own sense of hegemony over the region, fostering division. If we ever hope to become a prosperous nation once more that is powerful enough to maintain our sovereignty, it is important we become united."

  je_songhai_subject: "The Songhai Chains"
  je_songhai_subject_reason: "As subjects to the elite in [SCOPE.sCountry('scope_GAO').GetName], we see our lands plundered and our people shackled. If we ever hope to make a name for ourselves on the map instead of being some vague sidenote, we must achieve our independence."

  je_novo_cadiz: "The Beacon on the Fringes"
  je_novo_cadiz_reason: "Novo Cadiz holds an important position in the region - being the source of many rivers, a refueling point for the Spanish, and having a lucrative trade in peppers and other crops. However, the Spanish Empire is spread thin and the region is prone to instability - with land tossing back and forth between warlords and states. As the native population grows restless in the age of increasing nationalism, steps towards integration and assimilation might need to be taken to keep hold in the reigon."
  
  je_senegambia: "The Struggle for the Senegambia"
  je_senegambia_reason: "A series of Fulbe-led jihads have swept across the region, leading the establishment of the Futa Jallon Emirate. However, resistance to Fulani rule has led to regional fragmentation all the while European powers encroach on the region. As the Futa Jallon Emirate was once the most powerful state in the region, but the extent of its sovereignty and control will stay in question until it can be properly recognized."
  
  je_sahel: "Lord of the Sahel"
  je_sahel_reason: "Now that [ROOT.GetCountry.GetName] has established itself as a proper empire in the region, it hardly remains unique as many other polities have claimed to be such in the past, only to fragment and collapse from internal turmoil and invasions from greater, more organized powers. This story repeats across the African continent and until we can properly assert sovereignty in the region, we may very well find ourselves at the mercy of foreign overlords once more."

  treaty_name_crl_ftj_purchase: "The Gambia Lease"
  
  cda_exist_tt: "The Cote Des Affranchais or any variant of it no longer exists."
  jbc_dead_tt: "Jean-Baptiste de Champlain is dead."

  #Events

  dvg_guinea.1.t:0 "The Harbinger of the West"
  dvg_guinea.1.d:0 "The Guinea Trading Company sits in the Niger Delta, exchanging goods and people between West Africa and Arcadia. However, ever since the [SCOPE.sCountry('scope_PLA').GetName], it has become questionable whether keeping the slave trade is a worthy enterprise."
  dvg_guinea.1.f:0 "However, ever since the Coast of Freedmen was established, there have been questions about whether the Guinea Trade Company should continue the slave trade when the risk of a slave revolt always exist. However, much of the elite here in Guinea proper and back on the Plantagenian mainland are still very supportive of slavery in principle and profit. Either way, the landowners want a workforce they can rely on."
  dvg_guinea.1.a:0 "We will maintain our slave enterprise as is."
  dvg_guinea.1.b:0 "Maybe we should put new slaves on hold for a bit, and rely on serfs instead."

  dvg_guinea.2.t:0 "A Greater Guinea"
  dvg_guinea.2.d:0 "Despite the demographic odds, the [ROOT.GetCountry.GetName] has proven to be a capable power in the region as a proper colonizing force."
  dvg_guinea.2.f:0 "Alas, the vestiges of barbarism have been vanquished in place of civilized rule. We have showed them the power of glory, God, and gold, under the great Guinea Company!"
  dvg_guinea.2.a:0 "Let us maintain what we have."
  dvg_guinea.2.b:0 "Just a little bit further...we need to do some more civilizing..."

  dvg_guinea.3.t:0 "Colonial Collapse"
  dvg_guinea.3.d:0 "Without a foreign sponsors, the feasability of continued company operations has been called into question."
  dvg_guinea.3.f:0 "For a long time, one of the biggest obstacles to obstinence by the indigenous population was the treat of force from a powerful, foreign empire. However, with that threat removed, this disenfranchised majority is finding all the more reason to seize the country for itself."
  dvg_guinea.3.a:0 "We have, and always will be, an outpost of civilization amongst a sea of savages!"
  dvg_guinea.3.b:0 "We reject all colonial influence. A new nation will be built of many different peoples, side by side."
  dvg_guinea.3.c:0 "Let's try to secure a transitional government and a single, overarching culture to unify under. Away with regional identities, and on with a new post-ethnic future!"
  

  dvg_guinea.4.t:0 "The Name of the Country"
  dvg_guinea.4.d:0 "As a newly independent country, there is debate as to what we shall name ourselves."
  dvg_guinea.4.a:0 "Just keep the Guinea name to not indicate favoritism."
  dvg_guinea.4.b:0 "Benin it shall be, as we are proud of our forefathers."
  dvg_guinea.4.c:0 "Emancipe, for the country that tried to be."


  dvg_guinea.5.t:0 "The Ambitions of the Country"
  dvg_guinea.5.d:0 "As a newly independent, recognized country, there is debate as to what our ambitions shall be."
  dvg_guinea.5.a:0 "Let's build a stable nation from what we have."
  dvg_guinea.5.b:0 "We won't rest until all of bretheren are liberated."

  dvg_guinea.6.t:0 "[SCOPE.sCountry('scope_PLA').GetName] has banned Slavery"
  dvg_guinea.6.d:0 "Our overlord and sponsorship country, [SCOPE.sCountry('scope_PLA').GetName] has abolished slavery which has always been a lucrative part of our economy."
  dvg_guinea.6.a:0 "We shall follow suit and ban slavery too."
  dvg_guinea.6.b:0 "Let us find a new master instead, accordingly."
  dvg_guinea.6.c:0 "No, we shall carve out a new country here instead!"

 
  dvg_guinea.7.t:0 "A New Master"
  dvg_guinea.7.d:0 "A few candidates have been selected as ideal to be our new patron country."
  dvg_guinea.7.a:0 "Let's go with [SCOPE.sCountry('scope_AMA').GetName] as we know them better."
  dvg_guinea.7.b:0 " [SCOPE.sCountry('scope_DUA').GetName] seems to be more trustworthy."
  dvg_guinea.7.c:0 " [SCOPE.sCountry('scope_NBG').GetName] seems to be more promising."



  dvg_ashanti.1.t:0 "Ashanti Resurgent"
  dvg_ashanti.1.d:0 "Alas, we have asserted Ashanti sovereignty, now on the path back to prosperity."
  dvg_ashanti.1.f:0 "Already, someone is writing a song about how the gold coast is now inhabited by a golden kingdom. Perhaps one day, the pan-African movements will be flying Ashanti colors."
  dvg_ashanti.1.a:0 "Let's build a prosperous nation with what we have."
  dvg_ashanti.1.b:0 "It's time to liberate are brothers and sisters across the region."

  dvg_ashanti.2.t:0 "Akan Uprising"
  dvg_ashanti.2.d:0 "The indigenous Akani people, seeing themselves disenfranchised by the Afro-Frankish Elite, are revolting against their rule."
  dvg_ashanti.2.f:0 "As it turns out, the idea of eating baguettes and croissants did not sit well with people who would rather be eating jolof rice and fufu."
  dvg_ashanti.2.a:0 "They don't know what's best for them."
  dvg_ashanti.2.b:0 "Africans should be ruled by true Africans."

  dvg_ashanti.3.t:0 "Akan Uprising"
  dvg_ashanti.3.d:0 "We the indigenous Akani people, seeing themselves disenfranchised by the Afro-Frankish Elite,  are revolting against their rule. The Ashanti King has taken interest, seeing his fellow Akani take up arms."
  dvg_ashanti.3.f:0 " 'What are we even doing if we replace one tyrant with another?' 'I think it's worth the risk it if it prevents our future children from ever having the speak the cursed language that is French.' "
  dvg_ashanti.3.a:0 "Akani people are one people united against foreign intrusion!"
  dvg_ashanti.3.b:0 "We are fighting not just for the Akani, but for equality and that means no kings."

  dvg_ashanti.4.t:0 "Akan Uprising"
  dvg_ashanti.4.d:0 "Our Akani bretheren, seeing themselves disenfranchised by the Afro-Frankish Elite, are revolting against their rule."
  dvg_ashanti.4.f:0 "As it turns out, the idea of eating baguettes and croissants did not sit well with people who would rather be eating jolof rice and fufu. Apparently, they must have heard about how much of the latter the king has in his pantries."
  dvg_ashanti.4.a:0 "Let us help them. Akani people are one!"  
  dvg_ashanti.4.b:0 "We have no involvement in this."

  dvg_songhai.1.t:0 "Collapse of Songhai Rule"
  dvg_songhai.1.d:0 "As more nations break away from our grasp, there is a growing rejection of the Songhai culture and its legacy, further hindering any chances of restoring the Empire."
  dvg_songhai.1.f:0 " 'I told you, we should've cared more about the money business instead of the empire business!' 'What good is having money if you don't make an empire out of it?' "
  dvg_songhai.1.a:0 "It is time we abandon this pursuit and instead focus on self-reflection and improvement."
  dvg_songhai.1.b:0 "No, clearly we have given our subjects too much freedom to break away. The Songhai legacy isn't dead and must be restored."

  dvg_songhai.2.t:0 "Songhai Resurgent"
  dvg_songhai.2.d:0 "Despite the desire for liberty among its subjects, [ROOT.GetCountry.GetName] has continued the legacy of uniting the Sahel."
  dvg_songhai.2.f:0 " 'Mande? Dyula? Fulani? Arabic? If we have these many languages are we still even a united country?'  'Maybe we should not look at what's inside, but what's on the outside.' "
  dvg_songhai.2.a:0 "We are a single people, stronger together, for peace - side by side!"
  dvg_songhai.2.b:0 "Our legacy shall reach places it has yet to!"

  dvg_songhai.3.t:0 "Muting the Songhai Tirade"
  dvg_songhai.3.d:0 "We have finally broken away from our overlords, now the question has come to chart the course of the nation."
  dvg_songhai.3.f:0 " 'Maybe we can get into the empire business ourselves.' /n /n 'Why can't we just be in the money business instead?'  "
  dvg_songhai.3.a:0 "We need to pursue a new future for our nation and not dwell on the past."
  dvg_songhai.3.b:0 "The Songhai represented a chance of a great legacy, it was just in the wrong hands. We will make it right."

  dvg_songhai.4.t:0 "The Name of the Country"
  dvg_songhai.4.d:0 "As nationalist movements grow, some are suggest the country's name is too exclusive of its non-Songhai subjects."
  dvg_songhai.4.f:0 "As nationalist movements grow, some are suggest the country's name is too exclusive of its non-Songhai subjects."
  dvg_songhai.4.a:0 "What are they talking about? We are all Songhai."  
  dvg_songhai.4.b:0 "Perhaps a more generic name is preferable."

  dvg_songhai.5.t:0 "Liberty and Empire"
  dvg_songhai.5.d:0 "Alas, we have managed to maintain sovereignty over the region."
  dvg_songhai.5.a:0 "Let's focus on educating our people under a common identity."  
  dvg_songhai.5.b:0 "We shall accumulate such wealth that surpasses the old Mali Empire."

  dvg_emancipe.1.t:0 "The Coast of the Freedmen"
  dvg_emancipe.1.d:0 "The year is 1836, about a decade since a slave revolt has managed to expel African and White slaver traders."
  dvg_emancipe.1.f:0 "However, in the years following, the ruling Francophone elite have found it difficult to govern the indigenous population, provided the cultural differences. There is some concern on whether this country is truly an 'emancipating' one or just another colonizer."
  dvg_emancipe.1.a:0 "We intend to stay a Catholic, Francophone country - to lift up the local populace."
  dvg_emancipe.1.b:0 "We are as African as any other country in West Africa - bretheren stronger together."

  dvg_emancipe.2.t:0 "Freedom and Fraternity"
  dvg_emancipe.2.d:0 "Despite its many challenges, the Cote des Affranchais has managed to cement its legacy as a legitimate country in West Africa."
  dvg_emancipe.2.f:0 "In a speech to the nation, [ROOT.GetCountry.GetRuler.GetFullName] has laid out the future plans of the country. The other powers are paying close attention - will this nation be truly unique in its function and identity, and whether this will mean it will threaten other interests in the region."
  dvg_emancipe.2.a:0 "We have finally built our nation and established our place on the world stage. We will try to maintain our ideals through peaceful means."
  dvg_emancipe.2.b:0 "The time for liberation has come. We will not rest until all of our bretheren are free."

  dvg_emancipe.3.t:0 "The Death of the Modern Moses"
  dvg_emancipe.3.d:0 "Jean-Baptiste de Champlain, is now dead. Questions regarding his succession has begun."
  dvg_emancipe.3.f:0 "His funeral was attended by thousands all over the Cote des Affranchais, a testament to his legacy and the impact he had on our country. His death date has already been marked as been marked as an official holiday. He will be remembered as a hero and a symbol of freedom for generations to come. \n \n However, the debate over his succession looms over the country. There are those arguing keeping his succession within his family is simply how it should be, as is the case for most African countries already. However, there are those who argue that the principles of the country, centered around emancipiation, should indicate that no person is inherently more fit to rule than another, and that the country should be ruled by a democratically elected government instead."
  dvg_emancipe.3.a:0 "Succession is inherited, for stability."
  dvg_emancipe.3.b:0 "Emanicpation means enfranchisement."

  dvg_emancipe.4.t:0 "The Disenfranchisement"
  dvg_emancipe.4.d:0 "The subjugation of [ROOT.GetCountry.GetName] has sent shockwaves through its people, re-inforcing the idea that the Afro-Frankish are not fit to rule over a land they are still considered foreign in."
  dvg_emancipe.4.f:0 " 'They don't look too terribly different from the natives and they already speak a respectable international lanugage - French. Surely there's nobody better?' \n \n
  'But look where their leadership brought them. It's only prone to fuel resentment. Instead, maybe someone of our own caliber that will show proper subject guidance.' "
  dvg_emancipe.4.a:0 "This can only spell doom for our nation..."

  dvg_emancipe.5.t:0 "Running the Coast of Freedmen"
  dvg_emancipe.5.d:0 "The subjugation of the so-called 'Cote des Affranchais' has brought into question on who should be running the new colony."
  dvg_emancipe.5.f:0 " 'They don't look too terribly different from the natives and they already speak a respectable international lanugage - French. Surely there's nobody better?' \n \n
  'But look where their leadership brought them. It's only prone to fuel resentment. Instead, let's pick someone of our own caliber that will show proper subject guidance.' "
  dvg_emancipe.5.a:0 "Keep the Afro-Frankish in charge."
  dvg_emancipe.5.b:0 "Make this conventional colony."



  #Decisons
  dvg_afro_germanic: "Embrace an Afro-Germanic Identity"
  dvg_afro_germanic_desc: "As we are no longer ruled from overseas, let's work towards a compromise of  enfranchising our native populace."

  dvg_afro_latino: "Embrace an Afro-Latino Identity"
  dvg_afro_latino_desc: "As we are no longer ruled from overseas, let's work towards a compromise of  enfranchising our native populace."

  dvg_afro_frankish: "Embrace an Afro-Frankish Identity"
  dvg_afro_frankish_desc: "As we are no longer ruled from overseas, let's work towards a compromise of  enfranchising our native populace."

