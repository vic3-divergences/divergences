l_english:
  #Journal Entries
  
  je_guinea_imperialism: "Dominion over the Delta"
  je_guinea_imperialism_reason: "As a bastion of civilization, it is up to us to spread our control over the greater Niger Delta area, unchallenged even by the treacherous Afro Frankish."

  je_ashanti: "Cornered Kotoko"
  je_ashanti_reason: "To maintain its sovereignty, the Ashanti hegemony needs to be unquestioned."

  je_emancipe: "The Coast of Freedmen"
  je_emancipe_reason: "Our country has been founded as an anti slavery movement aimed to abolish slavery in West Africa."


  je_akan_nationalism: "Names and Blood"
  je_akan_nationalism_reason: "Despite the help in the revolt, the Afro-Frankish are still seen as a foreign imposition upon the indigenous Akan population. Under proper governance, perhaps a reconciliation can be reached."

  je_songhai_gao: "The Songhai Chorus"
  je_songhai_gao_reason: "As it stands, the Songhai Empire has fractured into too many different nations vying for their own sense of hegemony over the region, fostering division. If we ever hope to become a prosperous nation once more that is powerful enough to maintain our sovereignty, it is important we become united."

  je_songhai_subject: "The Songhai Chains"
  je_songhai_subject_reason: "As subjects to the elite in [SCOPE.sCountry('scope_GAO').GetName], we see our lands plundered and our people shackled. If we ever hope to make a name for ourselves on the map instead of being some vague sidenote, we must achieve our independence."

  je_novo_cadiz: "The Beacon on the Fringes"
  je_novo_cadiz_reason: "Novo Cadiz holds an important position in the region - being the source of many rivers, a refueling point for the Spanish, and having a lucrative trade in peppers and other crops. However, the Spanish Empire is spread thin and the region is prone to instability - with land tossing back and forth between warlords and states. As the native population grows restless in the age of increasing nationalism, steps towards integration and assimilation might need to be taken to keep hold in the reigon."


  
  cda_exist_tt: "The Cote Des Affranchais or any variant of it exists."

  #Events

  dvg_guinea.1.t:0 "The Funnel to the West"
  dvg_guinea.1.d:0 "The Guinea Trading Company sits in the Niger Delta, exchanging goods between West Africa and Arcadia."
  dvg_guinea.1.a:0 "For prosperity!"
  dvg_guinea.1.b:0 "For prestige!"

  dvg_guinea.2.t:0 "A Greater Guinea"
  dvg_guinea.2.d:0 "Alas, the vestiges of barbarism have been vanquished in place of civilized rule."
  dvg_guinea.2.a:0 "Let us maintain what we have."
  dvg_guinea.2.b:0 "Just a little bit further...we need to do some more civilizing..."

  dvg_guinea.3.t:0 "Colonial Collapse"
  dvg_guinea.3.d:0 "Without our foreign sponsors, the feasability of continued company operations has been called into question."
  dvg_guinea.3.a:0 "We have, and always will be, an outpost of civilization amongst a sea of savages!"
  dvg_guinea.3.b:0 "It is time to enfranchise those we can to ensure a peaceful transition of power."


  dvg_guinea.4.t:0 "The Name of the Country"
  dvg_guinea.4.d:0 "As a newly independent country, there is debate as to what we shall name ourselves."
  dvg_guinea.4.a:0 "Just keep the Guinea name to not indicate favoritism."
  dvg_guinea.4.b:0 "Benin it shall be, as we are proud of our forefathers."
  dvg_guinea.4.c:0 "Emancipe, for the country that tried to be."


  dvg_guinea.5.t:0 "The Ambitions of the Country"
  dvg_guinea.5.d:0 "As a newly independent country, there is debate as to what our ambitions shall be."
  dvg_guinea.5.a:0 "Let's build a stable nation from what we have."
  dvg_guinea.5.b:0 "We won't rest until all of Africa is liberated."

  dvg_guinea.6.t:0 "[SCOPE.sCountry('scope_PLA').GetName] has banned Slavery"
  dvg_guinea.6.d:0 "Our overlord and sponsorship country, [SCOPE.sCountry('scope_PLA').GetName] has abolished slavery which has always been a lucrative part of our economy."
  dvg_guinea.6.a:0 "We shall follow suit and ban slavery too."
  dvg_guinea.6.b:0 "Let us find a new master instead, accordingly."
  dvg_guinea.6.c:0 "No, we shall carve out a new country here instead!"

 
  dvg_guinea.7.t:0 "A New Master"
  dvg_guinea.7.d:0 "A few candidates have been selected as ideal to be our new patron country."
  dvg_guinea.7.a:0 "Let's go with [SCOPE.sCountry('scope_AMA').GetName] as we know them better."
  dvg_guinea.7.b:0 " [SCOPE.sCountry('scope_DUA').GetName] seems to be more trustworthy."
  dvg_guinea.7.c:0 " [SCOPE.sCountry('scope_NBG').GetName] seems to be more promising."



  dvg_ashanti.1.t:0 "Ashanti Resurgent"
  dvg_ashanti.1.d:0 "Alas, we have asserted Ashanti sovereignty, now on the path back to prosperity."
  dvg_ashanti.1.a:0 "Let's build a prosperous nation with what we have."
  dvg_ashanti.1.b:0 "It's time to liberate are brothers and sisters across the region."

  dvg_ashanti.2.t:0 "Akan Uprising"
  dvg_ashanti.2.d:0 "The indigenous Akani people, seeing themselves disenfranchised by the Afro-Frankish Elite, are revolting against their rule."
  dvg_ashanti.2.a:0 "They don't know what's best for them."
  dvg_ashanti.2.b:0 "Africans should be ruled by true Africans."

  dvg_ashanti.3.t:0 "Akan Uprising"
  dvg_ashanti.3.d:0 "We the indigenous Akani people, seeing themselves disenfranchised by the Afro-Frankish Elite,  are revolting against their rule. The Ashanti King has taken interest, seeing his fellow Akani take up arms."
  dvg_ashanti.3.a:0 "Akani people are one people united against foreign intrusion!"
  dvg_ashanti.3.b:0 "We are fighting not just for the Akani, but for equality and that means no monarchs either."

  dvg_ashanti.4.t:0 "Akan Uprising"
  dvg_ashanti.4.d:0 "Our Akani bretheren, seeing themselves disenfranchised by the Afro-Frankish Elite, are revolting against their rule."
  dvg_ashanti.4.a:0 "Let us help them. Akani people are one!"  
  dvg_ashanti.4.b:0 "We have no involvement in this."

  dvg_songhai.1.t:0 "Collapse of Songhai Rule"
  dvg_songhai.1.d:0 "As more nations break away from our grasp, there is a growing rejection of the Songhai culture and its legacy, further hindering any chances of restoring the Empire."
  dvg_songhai.1.a:0 "It is time we abandon this pursuit and instead focus on self-reflection and improvement."
  dvg_songhai.1.b:0 "No, clearly we have given our subjects too much freedom to break away. The Songhai legacy isn't dead any must be restored."

  dvg_songhai.2.t:0 "Songhai Resurgent"
  dvg_songhai.2.d:0 "Alas, the Songhai have reuinted the Empire."
  dvg_songhai.2.a:0 "We are a single people, stronger together, for peace - side by side!"
  dvg_songhai.2.b:0 "The Songhai legacy shall reach places it has yet to!"

  dvg_songhai.3.t:0 "Muting the Songhai Tirade"
  dvg_songhai.3.d:0 "We have finally broken away from our overlords, now the question has come to chart the course of the nation."
  dvg_songhai.3.a:0 "We need to pursue a new future for our nation and not dwell on the past."
  dvg_songhai.3.b:0 "The Songhai represented a chance of a great legacy, it was just in the wrong hands. We will make it right."

  dvg_songhai.4.t:0 "The Name of the Country"
  dvg_songhai.4.d:0 "As nationalist movements grow, some are suggest the country's name is too exclusive of its non-Songhai subjects."
  dvg_songhai.4.a:0 "What are they talking about? We are all Songhai."  
  dvg_songhai.4.b:0 "Perhaps a more generic name is preferable."

  dvg_emancipe.1.t:0 "The Coast of the Freedmen"
  dvg_emancipe.1.d:0 "The year is..."
  dvg_emancipe.1.a:0 "Succession is inherited, for stability."
  dvg_emancipe.1.b:0 "Emanicpation means enfranchisement."
  #Decisons
  dvg_afro_germanic: "Embrace an Afro-Germanic Identity"
  dvg_afro_germanic_desc: "As we are no longer ruled from overseas, let's work towards a compromise of  enfranchising our native populace."

  dvg_afro_latino: "Embrace an Afro-Latino Identity"
  dvg_afro_latino_desc: "As we are no longer ruled from overseas, let's work towards a compromise of  enfranchising our native populace."

  dvg_afro_frankish: "Embrace an Afro-Frankish Identity"
  dvg_afro_frankish_desc: "As we are no longer ruled from overseas, let's work towards a compromise of  enfranchising our native populace."

