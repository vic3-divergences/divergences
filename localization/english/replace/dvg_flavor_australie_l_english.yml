l_english:

#Journal Entry

 je_nvz_colonization: "Frontier of Civilization"
 je_nvz_colonization_reason: "As the Burgundian sets foot on the western edge of the Zhourao continent, pioneers have seen opportunity. A large section of a continent - barren and unclaimed by any recognized power that is free for the taking, at least according to the doctrine of Terra Nullius."
 je_nvz_colonization_lobby: "As the Burgundian sets foot on the western edge of the Zhourao continent, pioneers have seen opportunity. A large section of a continent - barren and unclaimed by any recognized power that is free for the taking, at least according to the doctrine of Terra Nullius."
 
 je_australie: "The West in the South"
 je_australie_reason: "Situated far away and isolated - paying unrequited taxes to their European overlords, being unable to completely tame the local fauna, facing the ever-looming threat of aboriginal resistance, Indonesian labor competition, and Zhourao regional hegemony, there is growing fervor for a common identity and nation for these antipodean settlers."

 je_indo_aus: "Spreading the Spice"
 je_indo_aus_reason: "As the colony from what was known as Nouvelle Zelande has bas become unsustainable for the demands of labor, relocating some laborers from the Indonesian colony has become an economical substitute. However, this is likely not going to be taken lightly by the White population who see the imported labor as competition as opposed to bretheren."

 je_chougie_unite: "Unite the Chougien colonies"
 je_chougie_unite_reason: "As the needs of our population grow, so have calls for a united administration that permits free settlement. As it stands, the New Jersey colony is split into several disparate plots along the coast of Yolngu. If there could be the means to properly connect them, there would be a better chance to establish a standard of living. However, it is unlikely that Yolngu would agree to this unless we sign a treaty."


 je_chougie_unite_yln: "Unite the Chougien colonies"
 je_chougie_unite_yln_reason: "As the needs of our population grow, so have calls for a united administration that permits free settlement. As it stands, the New Jersey colony is split into several disparate plots along the coast of Yolngu. Ideally, doing away with these imaginary lines would help both peoples. However, it is unlikely that New Jerseyers would agree to this unless we sign a treaty."

 je_chougie_racism: "Subjects and Citizens"
 je_chougie_racism_reason: "The colony of what was once known as New Jersey and the Yolngu Sultanate have managed to unite into a single entity known as 'Chougie'. Despite being bound by treaties to reconcile these differences, the White population of the colony see themselves as the rightful owners of the land and are opposed to the idea of sharing it with the indigenous population, who see themselves the proper custodians of the land."

 je_emu_war: "The Great Emu War"
 je_emu_war_reason: "Ever since the Burgundians have landed on the shores of the Zhourao continent, settlement has long been impeded by the unfamiliar and dangerous wildlife. The colonial government has officially began operation to curb the issue, but so long as efforts prove futile, there will be greater calls for Australien nationalism."

 je_penal_australia: "Imprisoned and Away"
 je_penal_australia_reason: "With the aim of securing a foothold in the antipodean continent, the Burgundians have begun to transport convicts to the colony. However, this has led to a lot of unrest and rebellion. The colony is in a precarious position, and it is unclear if it will survive, hence the import of convicts though the nature of their 'rehabilitation' post-transport is up for inquiry."
 je_penal_australia_lobby: "Deal with the consequences of having a penal colony or otherwise."

 je_nvz_racism: "Race and Reconciliation"
 je_nvz_racism_reason: "Following the abolition of the convict transportation scheme, colonial authorities and interests are seeking to sustain the labor demands of the colony. Yet, with the rise of nationalism, the ability to reoncicile differences between racial interests has to be seen."

 je_aussie_wildlife: "The Wild Wars"
 je_aussie_wildlife_reason: "The local fauna and flora of [concept_dod_zhourao] are a challenge to the farmers of [ROOT.GetCountry.GetName]. With the lack of knowledge or means to protect their property, the farmers regularly face a loss of crops and livestock."

#Events

 dvg_australie.1.t: "The Antipodean Frontier"
 dvg_australie.1.d: "In the 18th century, the Burgundians discovered a continent directly south of their East Indies possessions. Now, seeing this as unclaimed land they have begun to colonize it - with the help of convicts and indentured laborers."
 dvg_australie.1.f: "The nature of this colony is different than Burgundy's other possessions - primarily intended to reinforce Burgundian colonial claims, especially in the context of the resource boom in Zhourao and the potential of something happening to the East Indies colonies. However, the colony has been struggling to find its footing. The land is harsh and unforgiving, the local fauna is dangerous, and the indigenous peoples are hostile. The colony has been relying on convicts and indentured laborers to do the hard work of colonization, but this has led to a lot of unrest and rebellion. The colony is in a precarious position, and it is unclear if it will survive, hence the import of convicts though the nature of their 'rehabilitation' post-transport is up for inquiry."
 dvg_australie.1.a: "We shall focus more on providing these convicts with work in sustaining the colony on the frontier."
 dvg_australie.1.b: "We shall focus more on providing these convicts with work in sustaining the colony in the ports."
 #NVZ POV
 dvg_australie.2.t: "The Penal Colony Debate"
 dvg_australie.2.d: "The growing turmoil in the country - especially with the indigenous-settler conflicts, costs of convict transportation and settlement, and concerns of the humane nature of the transport scheme has brought debate."
 dvg_australie.2.f: "As it stands however, the colony is still in its infancy and it is unlikely that it will be able to sustain itself without the help of convicts. The colony is in a precarious position, and it is unclear if it will survive, hence the import of convicts though the nature of their 'rehabilitation' post-transport is up for inquiry. However, there are alternative proposals to sustain the colony's labor demands - such as providing financial incentives for free settlers from Europe or importing indentured labor from the East Indies."
 dvg_australie.2.a: "Let's formally demand the end of convict transportation from Burgundy to the colony."
 dvg_australie.2.b: "The status quo is already good as is."
 #BRG POV
 dvg_australie.3.t: "The Penal Colony Debate"
 dvg_australie.3.d: "The growing turmoil in the Zhourao colonies - especially with the disputes with the indigenous population, costs of convict transportation and settlement, and concerns of the humane nature of these transport has brought debate."
 dvg_australie.3.f: "As it stands however, the colony is still in its infancy and it is unlikely that it will be able to sustain itself without the help of convicts. The colony is in a precarious position, and it is unclear if it will survive, hence the import of convicts though the nature of their 'rehabilitation' post-transport is up for inquiry. However, there are alternative proposals to sustain the colony's labor demands - such as providing financial incentives for free settlers from Europe or importing indentured labor from the East Indies."
 dvg_australie.3.a: "It is time we put this practice to an end."
 dvg_australie.3.b: "It's not up to the convicts to set the terms of their treatment."

 dvg_australie.4.t: "The Abolition of the Convict Transports"
 dvg_australie.4.d: "The Burgundian government has officially decided to abolish the transportation of convicts into our territory. Now, alternative measures of sustaining the colony's population are being drafted."
 dvg_australie.4.f: "The two main proposals are to provide financial incentives for free settlers from Europe or to import indentured labor from the East Indies. The former is more expensive but is more likely to be accepted by the White population, while the latter is cheaper but is likely to be met with resistance from the White population who see the imported labor as competition as opposed to bretheren."
 dvg_australie.4.a: "Provide financial incentives for free settlers from Europe, cementing the legacy of the West in the South."
 dvg_australie.4.b: "Indonesian laborers it is - we're running an enterprise and we need workers less willing to complain."
 
 dvg_australie.5.t: "Antipodean Resistance"
 dvg_australie.5.d: "As the number of laborers from the East Indies being imported has increased, so to has the popularity of 'anti-replacement' movements."
 dvg_australie.5.f: "With the rise of nationalism in Europe, the idea of a nation-state based on a common identity - such as race, language, and faith has become more popular. The White population of the colony see themselves as the rightful owners of the land and are opposed to the idea of importing labor from the East Indies. They see the imported labor as competition and a threat to their way of life. The anti-replacement movements have gained traction and is likely to lead to increased tensions between the White population and the imported laborers."
 dvg_australie.5.a: "Maybe these nationalist movements have a point."
 dvg_australie.5.b: "Just more bigoted rubbish from incompetence."

 dvg_australie.6.t: "The Anglois Away"
 dvg_australie.6.d: "In the late 18th century, the Dual Monarchy was able to secure a degree of independence for the Yolngu from the Marrans and Makasarrans and establish a colony in the vicinity known as 'New Jersey'. "
 dvg_australie.6.f: "Being the most remote of the Anglois colonies, New Jersey lacks the manpower the other colonies of the Dual Monarchy has and as such has had to made compromises with the local population. It is believed that in due time, the locals will acclimate to the wonders of Western advancements, be it spiritual or economical."
 dvg_australie.6.a: "We are here to help spread the word of Jesus to the local population."
 dvg_australie.6.b: "We are here to bring economic prosperity to this part of the world."

 dvg_australie.7.t: "The Establishment of Chougie"
 dvg_australie.7.d: "Thanks to the fruitful relationship and negotations between the representatives of New Jersey, the Dual Monarchy, and the Yolngu, a new entity known as 'Chougie' has been established."
 dvg_australie.7.f: "With the name of 'Chougie' itself being a derivation of 'Zhourao', it is a sign that the Francophones seek to establish a more lasting presence in the region - as opposed to just being mere passerby traders and missionaries. The new bureaucracy of Chougie hopes to facilitate the settlement of new arrivals from the European heartlands while also maintaining a degree of peace with the aboriginal population. However, not all new settlers are intent on keeping this peaceful balance - as the establishment of Chougie itself was just a mere stepping stone for showing the people in this part of the world more 'civilized' concepts of doing things."
 dvg_australie.7.a: "For peace and prosperity between our peoples!"

 dvg_australie.8.t: "Land Use Dispute"
 dvg_australie.8.d: "As more immigrants flow from Europe, a particular case over land rights has reached the upper echelons of our courts. A precedent needs to be set."
 dvg_australie.8.f: "In this particular matter, a European settler legally purchased a piece of land from a local Aboriginal hunter, however the two had a very different understanding of 'land rights'. The European settler accused the Aboriginal hunter's family of trespassing on the land he supposedly bought exclusionary rights to, but the Aboriginal interpretation of it was that they would have still have access to the resources on it, and the rights were merely personal habitation purposes."
 dvg_australie.8.a: "We side with the European settler."
 dvg_australie.8.b: "We side with the Aboriginal hunter."


 dvg_australie.9.t: "The Yolngu Defection"
 dvg_australie.9.d: "Seeing that the Yolngu are increasingly dissatisfied with the colonial administration of the Anglois, they have decided to unite with the Marrans."
 dvg_australie.9.f: "Despite the supposed wonders brought to them by Anglois administration, Yolngu have long been dissatisfied with the colonial administration of the Dual Monarchy, and have decided to unite with the Marrans as their fellow bretheren. This is a major blow to the Dual Monarchy's foothold in the region, as the Yolngu were once their most loyal subjects of the aboriginals. Already, the White settlers are calling upon the aid of the government back in Europe."
 dvg_australie.9.a: "It is time that proper civility and order is enforced upon these ungrateful savages."
 dvg_australie.9.b: "The Europeans have long overstayed their welcome and shall be driven out!"

 dvg_australie.10.t: "An Adventurous Charter"
 dvg_australie.10.d: "A petition has been sent to the governor general's office - detailing the ventures of an entrepeneur by the name of Jean Poirot who would like to establish a 'Poirotville' a bit beyond the edges of our mapped frontier in the land we already intended to name 'Terrejan'. "
 dvg_australie.10.f: "The petition is full of embellishments - detailing how large tracts of land were traded for only a hundred francs worth of cloths, food, and tools. There are many within our offices who believe we should take advantage of this opportunity to claim more stretches of the continent for ourselves."
 dvg_australie.10.a: "We shall recognize this petition, and grant this ambitious individual a charter to colonize the area."
 dvg_australie.10.b: "If he's pulling a fast one on these poor aboriginals, he's doing the same to us."
 dvg_australie.10.c: "A personal guiding hand is needed for a proper, prosperous colony."


 dvg_australie.11.t: "Petition Rejected"
 dvg_australie.11.d: "The Burgundian Authorities have rejected our petition to end convict labor."
 dvg_australie.11.f: ""
 dvg_australie.11.a: "Maybe another time."

 dvg_australie.12.t: "Race Riots"
 dvg_australie.12.d: "In an ongoing dispute with employment, some pundits are advocating for new zoning standards - based on race."
 dvg_australie.12.f: " Seeing that there are conflicts over dietary preferences, religious practices, daily customs, among other things - it seems that a better solution might be to keep separate communities."
 dvg_australie.12.a: "We insist everyone get together and get along. We shall be one people!"
 dvg_australie.12.b: "Fine, we will cordon off specific sections for Indonesians here, Whites only in here, Aboriginals over there..."

 dvg_australie.13.t: "Calls to Prayer"
 dvg_australie.13.d: "Between the Muslims and Christians, there are growing calls to restrict the others' public calls to prayer."
 dvg_australie.13.f: "As mosques are being established by the new Muslim laborers, some local non-Muslims are complaining about the rather loud call to prayer. The Muslims are suggesting if they are restricted from broadcasting calls to prayer then so should the Christian bells signaling time."
 dvg_australie.13.a: "We are a Christian country. Only Christian calls to prayer will be tolerated. "
 dvg_australie.13.b: "The Muslims should be allowed to be as loud any Christian would be."
 dvg_australie.13.c: "We will restrict all public calls to prayer."

 dvg_australie.14.t: "Migration Restrictions"
 dvg_australie.14.d: "As unemployment inflates in the colony, there are growing calls to restrict migration."
 dvg_australie.14.f: "As the population grows, there are growing calls to restrict migration. The White population of the colony see themselves as the rightful owners of the land and are opposed to the idea of importing labor from the East Indies. They see the imported labor as competition and a threat to their way of life. The anti-replacement movements have gained traction and is likely to lead to increased tensions between the White population and the imported laborers."
 dvg_australie.14.a: "Very well - we will restrict European migration. They were being expensive anyway."
 dvg_australie.14.b: "We will restrict migration to maintain our colony's Western character."
 dvg_australie.14.c: "We shall stay on the side of fairness and freedom - imposing no such restrictions."

 dvg_australie.15.t: "Pride in Antipody"
 dvg_australie.15.d: "Following our decision to restrict European migration, a bold cohort of nationalists have taken this as a personal affront to their way of life. Accordingly, they have petitioned to create a 'White only' state in [SCOPE.sState('verland_state_scope').GetName] that would be administered separately from ours."
 dvg_australie.15.f: " This supposed new state would be known as 'Verland', a nod to the old Netherlander name for the continent - and also a reference to how far this land is from Europe. They have figured if they can get enough support from the White population, they can petition to secede from our administration and form their own state. The authorities have been made aware of this and are considering their options - as it is rumored some of them are armed."
 dvg_australie.15.a: "Apprehend them. We don't tolerate White nationalism here."
 dvg_australie.15.b: "Let them do their own thing in [SCOPE.sState('verland_state_scope').GetName], no harm in that, right?"


 dvg_australie.16.t: "The Verland Rebellion"
 dvg_australie.16.d: "Despite the refusal from colonial authorities to recognize their petition, the group calling themselves the 'Verlanders' have taken up arms in [SCOPE.sState('verland_state_scope').GetName] , hoping to create an independent, sovereign nation united by European heritage - the first of its kind on the continent."
 dvg_australie.16.f: "Already, they are seizing mining supplies to forge their own currency - the economics of it questionable but nonetheless a sign of their intent. East Indies Company and Burgundian colonial officials are furious of the dent to their profits over nationalist sentiments, and have begun to mobilize their forces to quell the rebellion. However, the Verlanders are well-armed and have a strong sense of purpose - they are determined to see their vision of a Neo-European homeland in the antipodes realized."
 dvg_australie.16.a: "For Unity! For Cosmopolity!"
 dvg_australie.16.b: "For Verland! For Freedom!"

 dvg_australie.18.t: "Victory of the Verlanders"
 dvg_australie.18.d: "In the face of overwhelming odds, a ragtag group of pioneers managed to fend off one of the most powerful empires on the planet."
 dvg_australie.18.f: "."
 dvg_australie.18.a: "Let's do our best to maintain the peace for now."
 dvg_australie.18d.b: "Let's work to free our fellow bretheren."

 dvg_australie.19.t: "Verlander Revolt - Aftermath"
 dvg_australie.19.d: "Following the Verlander Rebellion - it has become increasingly clear that the local population is becoming militant. A potential solution is in the works."
 dvg_australie.19.f: "."
 dvg_australie.19.a: "We should listen to the Verlanders' grievances - focus more on maintaining the integrity of the colony."
 dvg_australie.19.b: "If it's White nationalism they care about - then that's the problem. Best we do more to dilute their numbers."
 
 dvg_australie.20.t: "New Arrivals"
 dvg_australie.20.d: "A new batch of convicts have arrived in the colony, and the question has become on where to settle them."
 dvg_australie.20.f: "The colony is in a precarious position, and it is unclear if it will survive, hence the import of convicts though the nature of their 'rehabilitation' post-transport is up for inquiry. The question has become on where to settle them - either close to the administrative centre or on the frontier."
 dvg_australie.20.a: "Settle them close by, make it easier to manage them."
 dvg_australie.20.b: "Put them on the frontier. They can test the land for us."

 dvg_australie.21.t: "Danger Down Under?"
 dvg_australie.21.d: "As local farmers and other people on the frontier have trouble dealing with the local wildlife, there are growing calls for the administration to directly handle this problem."
 dvg_australie.21.f: " "First, it was a pack of dingoes that made off with half the chicken and eggs. Attempts have been made to harvest paddies of rice, with random levels of success but a consistently sizable amount of snakes and spiders. With the amount of crocs in the rivers AND seas, fishing aint't easy either. Don't even get us started on the emus..." - a farmer was quoted as saying "
 dvg_australie.21.a: "It is time we set up a comission to properly deal with this."
 dvg_australie.21.b: "Everyone should just fend for themselves."

 dvg_australie.22.t: "Great Emu...warriors?"
 dvg_australie.22.d: "One of the main nusciances of continental wildlife has long been the emus - large flightless birds that can run very fast."
 dvg_australie.22.f: " Emus regularly migrate after their breeding season, heading to the coast from the inland regions. With the cleared land and additional water supplies being made available for livestock by Nouvelle Zelandien farmers. Mercilessly, these emus consumed and spoiled the crops and left large gaps in fences where rabbits could enter and cause further problems. The farmers want payback."
 dvg_australie.22.a: "Send our troops after them."
 dvg_australie.22.b: "Let's start constructing better fortifications."

 dvg_australie.23.t: "Dingo and Got them yet, I say!"
 dvg_australie.23.d: "One of the main nusciances of continental wildlife has long been the dingos - dogs that hunt livestock in groups."
 dvg_australie.23.f: "Dingoes occurred throughout the continent before European colonisation as alongside the humans they were often the top predator. However, colonisation has brought them a new and tasty target for the now-established dingoes: livestock. Unlike other pests however, these dingos are capable of engaging in coordinated attacks on entire ranches - being able to manuever around human tactics."
 dvg_australie.23.a: "Send our troops after them."
 dvg_australie.23.b: "Let's start constructing better fortifications."

 dvg_australie.24.t: "Failure of the Wildlife Dispatch Troops"
 dvg_australie.24.d: "Despite using some of the most modern weaponry, the armed forces have failed to defeat the wildlife obstructing our agricultural practices."
 dvg_australie.24.f: " The Emus were dodging one bullet after the other, as if they already know what to do and where to run. Some of our troops even panicked and deserted as soon as they saw the giant birds come after them!"
 dvg_australie.24.a: "Send even more troops after them."
 dvg_australie.24.b: "We should build some fortifications instead."
 dvg_australie.24.c: "Maybe we should just let nature run its course and not do anything."


 dvg_australie.25.t: "Failure of the Wildlife Dispatch Troops"
 dvg_australie.25.d: "Despite using some of the most modern weaponry, the armed forces have failed to defeat the wildlife obstructing our agricultural practices."
 dvg_australie.25.f: " The Dingoes were dodging one bullet after the other, as if they already knew where to hide. Some of our troops even panicked and deserted as soon as they watched their comrade get ambushed!"
 dvg_australie.25.a: "Send even more troops after them."
 dvg_australie.25.b: "We should build some fortifications instead."
 dvg_australie.25.c: "Maybe we should just let nature run its course and not do anything."

 dvg_australie.26.t: "The Establishment of Chougie"
 dvg_australie.26.d: "Thanks to the fruitful relationship and negotations between the representatives of New Jersey, the Dual Monarchy, and the Yolngu, a new entity known as 'Chougie' has been established. However, the White settlers are skeptical this arrangement can work."
 dvg_australie.26.f: "With the name of 'Chougie' itself being a derivation of 'Zhourao', it is a sign that the Francophones seek to establish a more lasting presence in the region - as opposed to just being mere passerby traders and missionaries. The new bureaucracy of Chougie hopes to facilitate the peace between new arrivals from the European heartlands while also maintaining a degree of peace with the aboriginal population. However, not all new settlers are intent on maintaining this peaceful balance - as the establishment of Chougie itself was to them a step down on the social ladder."
 dvg_australie.26.a: "The White people are on our land, and they will follow our rules!"
 dvg_australie.26.b: "We will go the extra mile to make sure these guests keep their privileges."

 dvg_australie.27.t: "Re-Civilization"
 dvg_australie.27.d: "Just as like how our forefathers of [ROOT.GetCountry.GetName] embraced Muslim traders and their teachings for the advancements they brought, so to have our current rulers with the West. "
 dvg_australie.27.f: "Already, our country is under assault by the West's ideals of modernity - in the fields of warfare, industry, theology - the old ways aren't serving us as they used to. Everywhere across the world and now here - western influences spread like wildfire through our people. As such, it has become necessary to assume some control over our own destiny by finding the right balance between keeping up with our potential new overlords but also maintaining our character."
 dvg_australie.27.a: "Vive la [ROOT.GetCountry.GetAdjective]"

 dvg_australie.28.t: "The Loss of New Jersey"
 dvg_australie.28.d: "Following the Aboriginal takeover, many White people of what was called 'New Jersey' have found themselves to be disenfranchised and are coming for our side of the continent in droves. "
 dvg_australie.28.f: "Despite the previous worry about being replaced by Indonesian labor, many of our local White population are embracing these new neighbors with open arms."
 dvg_australie.28.a: "We have more in common than what divides us! For kinship! For fraternite!"
 dvg_australie.28.b: "New Jerseyans? More like...new problems! We can't trust a bunch of beach bogans."


 dvg_australie.29.t: "The Unification of Zhourao"
 dvg_australie.29.d: "As the Oriental polities of the continent have united, there is growing anxiety and fervor for a united, Australien nation to balance it out."
 dvg_australie.29.f: " There is growing debate on whether depending on our overlord would be reliable, should the people of Zhourao decide it's time to become the continental hegemon. Our overlord still has some technological advantages and interests in us to protect us against the Zhourao threat - but their main base is a long distance across the seas. Consequently, there are also increased calls to be able to fend for ourselves and negotiate our own terms on our own soil, should the need arise."
 dvg_australie.29.a: "We will be safer if we stay more connected with our overlord!"
 dvg_australie.29.b: "The time has come to work for our own independence."


 dvg_australie.30.t: "Bretheren in Arms?"
 dvg_australie.30.d: "As the Oriental polities of the continent have united, there is growing anxiety and fervor for a united, Australien nation to balance it out."
 dvg_australie.30.f: " There is growing debate on whether depending on our overlord would be reliable, should the people of Zhourao decide it's time to become the continental hegemon. Our overlord still has some technological advantages and interests in us to protect us against the Zhourao threat - but their main base is a long distance across the seas. Consequently, there are also increased calls to be able to fend for ourselves and negotiate our own terms on our own soil, should the need arise."
 dvg_australie.30.a: "We will be safer if we stay more connected with our overlord!"
 dvg_australie.30.b: "The time has come to work for our own independence."


 dvg_australie.31.t: "A Joint Mutiny?"
 dvg_australie.31.d: "As it stands, the Australien colonies are under separate overlords. A plan is being drafted on how unification should play out."
 dvg_australie.31.f: " There is growing debate on whether depending on our overlord would be reliable, should the people of Zhourao decide it's time to become the continental hegemon. Our overlord still has some technological advantages and interests in us to protect us against the Zhourao threat - but their main base is a long distance across the seas. Consequently, there are also increased calls to be able to fend for ourselves and negotiate our own terms on our own soil, should the need arise."
 dvg_australie.31.a: "They should unify under our overlord."
 dvg_australie.31.b: "We should all be independent."
 dvg_australie.31.c: "Stick with the status quo, this is too complicated."



 dvg_australie.32.t: "A Joint Mutiny?"
 dvg_australie.32.d: "As it stands, the Australien colonies are under separate overlords. The Nouzeliens have already drafted a plan for a 'joint mutiny.' "
 dvg_australie.32.f: " There is growing debate on whether depending on our overlord would be reliable, should the people of Zhourao decide it's time to become the continental hegemon. Our overlord still has some technological advantages and interests in us to protect us against the Zhourao threat - but their main base is a long distance across the seas. Consequently, there are also increased calls to be able to fend for ourselves and negotiate our own terms on our own soil, should the need arise."
 dvg_australie.32.a: "We will join when the time comes."
 dvg_australie.32.b: "We want no part in this."


 dvg_australie.33.t: "New Jerseyers Agree to Mutiny"
 dvg_australie.33.d: "As it stands, the Australien colonies are under separate overlords. The Nouzeliens have already drafted a plan for a 'joint mutiny.' "
 dvg_australie.33.f: " There is growing debate on whether depending on our overlord would be reliable, should the people of Zhourao decide it's time to become the continental hegemon. Our overlord still has some technological advantages and interests in us to protect us against the Zhourao threat - but their main base is a long distance across the seas. Consequently, there are also increased calls to be able to fend for ourselves and negotiate our own terms on our own soil, should the need arise."
 dvg_australie.33.a: "The time to revolt is now!"
 dvg_australie.33.b: "We will rise when the time is right."


 dvg_australie.34.t: "The Australien Revolution"
 dvg_australie.34.d: "Alas, the antipodean colonies, have risen up in revolt."
 dvg_australie.34.f: " 'We hope today that today, whether we are victorious in our revolution or not - that we at least send the message that fairness should be the standard for a nation and its people. We will not stand idly by as we are punished for our lives and as such, we shall make the effort to pave our own path!' "
 dvg_australie.34.a: "Vive Australie!" 
 dvg_australie.34.b: "Convicts can't be trusted with colonies." 


 dvg_australie.34.t: "Revolution Vanquished!"
 dvg_australie.34.d: "Alas, the antipodean colonies have been defeated in their revolt."
 dvg_australie.34.f: " Whatever the message of this supposed revolution and the nation it aimed to create was, one thing is clear - the status quo clearly wasn't working. Now, the question has become how it should be governed moving forward."
 dvg_australie.34.a: "Re-Organize the colonies under Company rule." 
 dvg_australie.34.b: "Rule them as a proper part of our country." 





#Decisions

 dvg_end_convicts_australie: "Abolish the Penal Transportation Scheme "
 dvg_end_convicts_australie_desc: "As ideas of human rights and fairness begin to spread, an increasing amount of people are protesting our efforts to send convicts of all kinds to a far away continent as indentured labour. There's an argument to be made that it's more practical to use free labourers instead."

